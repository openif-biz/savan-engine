description: "クリーンになったSAVAN 2.0環境をGitHubへ同期する"
tasks:
  - type: command
    description: "変更をGitにステージング"
    execute: "git add ."
    require_approval: false
  - type: command
    description: "クォーテーション不要の安全なコマンドでコミットとPush"
    execute: "git commit -m Clean_up_legacy_files_and_update_gitignore && git push origin main"
    require_approval: true
