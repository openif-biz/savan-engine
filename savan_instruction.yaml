version: "2.0"
description: "GitHubリポジトリの初期化と初回Push（修正版）"
tasks:
  - type: "command"
    description: "Gitの保存（コミット）"
    execute: 'git add . && git commit -m "SAVAN 2.0 開発スタート・初期コミット" && git branch -M main'
    require_approval: false
  - type: "command"
    description: "GitHubへのアップロード（Push）"
    execute: 'git remote set-url origin https://github.com/[ユキ様のGitHubユーザー名]/savan-engine.git 2> || git remote add origin https://github.com/[ユキ様のGitHubユーザー名]/savan-engine.git && git push -u origin main'
    require_approval: true
